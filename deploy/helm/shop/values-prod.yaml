global:
  image:
    tag: "1.0.0" # prod pins an immutable release tag, never 'latest'

services:
  catalog:
    replicas: 3
  orders:
    replicas: 3
  gateway:
    replicas: 3
    ingress:
      host: shop.example.com

serviceMonitor:
  enabled: true

resources:
  requests:
    cpu: 100m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi
