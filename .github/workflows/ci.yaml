name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write
  id-token: write # keyless cosign signing via OIDC

jobs:
  # One matrix entry per service; language-specific lint/test, then a common
  # build -> scan -> SBOM -> sign -> push pipeline.
  service:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: catalog, context: services/catalog, lang: go }
          - { name: orders, context: services/orders, lang: python }
          - { name: gateway, context: services/gateway, lang: node }
    steps:
      - uses: actions/checkout@v4

      # ---- lint + test (per language) ----
      - if: matrix.lang == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - if: matrix.lang == 'go'
        working-directory: ${{ matrix.context }}
        run: |
          go vet ./...
          go test ./...

      - if: matrix.lang == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - if: matrix.lang == 'python'
        working-directory: ${{ matrix.context }}
        run: |
          pip install -r requirements-dev.txt
          ruff check app tests
          python -m pytest -q

      - if: matrix.lang == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: "22"
      - if: matrix.lang == 'node'
        working-directory: ${{ matrix.context }}
        run: |
          npm ci
          npm run typecheck
          npm test

      # ---- build (load locally so we can scan before pushing) ----
      - uses: docker/setup-buildx-action@v3
      - name: Compute image ref
        id: img
        run: echo "ref=${REGISTRY}/${{ github.repository_owner }}/shop-${{ matrix.name }}:${{ github.sha }}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          load: true
          push: false
          tags: ${{ steps.img.outputs.ref }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- security gate: fail on fixable HIGH/CRITICAL ----
      - name: Trivy scan (gate)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin v0.71.2
          # Gate on vulns in OUR dependencies (npm/pip/go); base-image OS CVEs are
          # managed by updating the base, not by failing every build on Debian churn.
          trivy image --pkg-types library --severity HIGH,CRITICAL --ignore-unfixed --exit-code 1 "${{ steps.img.outputs.ref }}"
          echo "== full (informational) base+deps scan ==" && trivy image --severity HIGH,CRITICAL --ignore-unfixed "${{ steps.img.outputs.ref }}" || true

      # ---- SBOM ----
      - name: Generate SBOM (syft)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
          syft "${{ steps.img.outputs.ref }}" -o spdx-json > "sbom-${{ matrix.name }}.spdx.json"
      - uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.spdx.json

      # ---- push + keyless sign (main only) ----
      - if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - if: github.ref == 'refs/heads/main'
        run: docker push ${{ steps.img.outputs.ref }}
      - if: github.ref == 'refs/heads/main'
        uses: sigstore/cosign-installer@v3.7.0
      - if: github.ref == 'refs/heads/main'
        run: cosign sign --yes ${{ steps.img.outputs.ref }}

  # Render/lint the Helm chart on every change.
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.18.4
      - run: |
          helm lint deploy/helm/shop
          helm template shop deploy/helm/shop -f deploy/helm/shop/values-dev.yaml >/dev/null
          helm template shop deploy/helm/shop -f deploy/helm/shop/values-prod.yaml >/dev/null

  # Image promotion is handled by ArgoCD auto-sync against the pushed image
  # (see deploy/argocd/). CI never pushes to a protected main branch; a tag bump,
  # if desired, is done via a PR — keeping branch protection intact.
